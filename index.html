<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mathematics Calculator">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Calculator</h1>
    <div class="container">
        <input placeholder="0" id="display" readonly />
       <div class="row">
           <button  class="btn-op">AC</button>
           <button  class="btn-op">%</button>
           <button class="btn-op">DEL</button>
           <button  class="btn-op" >/</button>
        </div>

        <div class="row">
           <button  class="btn">7</button>
           <button  class="btn">8</button>
           <button  class="btn">9</button>
           <button  class="btn-op">*</button> 
        </div>
           
        <div class="row">
           <button  class="btn">4</button>
           <button  class="btn">5</button>
           <button  class="btn">6</button>
           <button  class="btn-op" >-</i></button>   
        </div>

        <div class="row">
           <button class="btn">1</button>
           <button class="btn">2</button>
           <button class="btn">3</button>
           <button class="btn-op">+</button>
        </div>
           
        <div class="row">
           <button  class="btn">00</button>
           <button  class="btn">0</button>
           <button class="btn" >.</button>
           <button  class="btn-equal">=</button>
        </div>
    </div> 

<script src="app.js"></script>
</body>
</html>
